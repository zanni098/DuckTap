name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Type check
        run: mypy
      - name: Tests
        run: pytest -q

  generated-clis:
    # Compile a generated CLI in each supported language to prove the
    # multi-language generators emit buildable projects, not just text.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --no-self-update
      - name: Install DuckTap
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile generated Go / Rust / TypeScript CLIs
        env:
          DUCKTAP_COMPILE_TESTS: "1"
        run: pytest -q tests/test_generated_multilang.py
